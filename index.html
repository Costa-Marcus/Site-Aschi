<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Portal Contábil</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="tema-claro">

    <main class="pagina-login">
        <section class="card-login" aria-labelledby="titulo-login">
            <header class="topo-card">
                <h1 id="titulo-login" class="logo-texto">Portal Contábil</h1>

                <button type="button" id="toggle-tema" class="btn-tema">
                    Alternar tema
                </button>
            </header>

            <p class="subtitulo">
                Acompanhe seus processos e tenha acesso às informações do seu atendimento.
            </p>

            <form id="form-login" class="form-login">
                <p class="campo">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </p>

                <p class="campo">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </p>

                <button type="submit" class="btn-entrar">Entrar</button>
            </form>

            <a href="https://wa.me/5511995734237" target="_blank" class="btn-whatsapp">
                Falar no WhatsApp
            </a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
